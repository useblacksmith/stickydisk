name: "Blacksmith Sticky Disk"
author: Aditya Maru
description: "Creates a sticky disk on Blacksmith"
branding:
  icon: folder-plus
  color: black
inputs:
  key:
    description: "A unique key to identify the sticky disk"
    required: true
  path:
    description: "The path at which to mount the sticky disk"
    required: true
  commit:
    description: "Whether to commit the disk on teardown. Set to 'false' for restore-only mounts where another job writes the cache."
    required: false
    default: "true"
runs:
  using: "node24"
  main: "dist/index.js"
  post: "dist/post/index.js"
