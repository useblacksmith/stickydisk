name: "Blacksmith Sticky Disk"
author: Aditya Maru
description: "Creates a sticky disk on Blacksmith"
branding:
  icon: folder-plus
  color: black
inputs:
  key:
    description: "A unique key to identify the sticky disk"
    required: true
  path:
    description: "The path at which to mount the sticky disk"
    required: true
  commit:
    description: "Controls whether the disk is committed (snapshotted) after the job. 'true' always commits (default), 'false' never commits (read-only consumers), 'on-change' only commits if filesystem content changed since mount, 'if-missing' only commits if no prior snapshot existed (the disk was freshly formatted)."
    required: false
    default: "true"
runs:
  using: "node24"
  main: "dist/index.js"
  post: "dist/post/index.js"
